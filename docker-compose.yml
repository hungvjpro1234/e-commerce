volumes:
  chatbot_db_data:
  staff_db_data:
  customer_db_data:
  cloth_db_data:
  laptop_db_data:
  mobile_db_data:
  accessory_db_data:
  home_appliance_db_data:
  book_db_data:
  beauty_db_data:
  food_db_data:
  sports_db_data:
  gaming_db_data:
  behavior_db_data:
  recommendation_db_data:
  neo4j_data:
