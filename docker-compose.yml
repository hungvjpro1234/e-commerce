    container_name: mobile-service
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./services/mobile-service:/app
      - ./shared:/app/shared
    ports:
      - "${MOBILE_SERVICE_PORT:-8005}:8000"
    depends_on:
      - mobile-db

  accessory-service:
