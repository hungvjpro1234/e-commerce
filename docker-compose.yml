  chatbot-service:
    <<: *app-base
    build:
      context: ./services/chatbot-service
    container_name: chatbot-service
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./services/chatbot-service:/app
      - ./shared:/app/shared
    ports:
      - "${CHATBOT_SERVICE_PORT:-8006}:8000"
    depends_on:
      - chatbot-db
      - neo4j

  neo4j:
    image: neo4j:5.20
    container_name: neo4j
    environment:
      NEO4J_AUTH: "${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-neo4jpassword}"
      NEO4J_dbms_default__database: ${NEO4J_DATABASE:-neo4j}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

  chatbot-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${CHATBOT_DB_NAME}
      POSTGRES_USER: ${CHATBOT_DB_USER}
      POSTGRES_PASSWORD: ${CHATBOT_DB_PASSWORD}
    ports:
      - "5438:5432"
    volumes:
      - chatbot_db_data:/var/lib/postgresql/data

  staff-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${STAFF_DB_NAME}
      POSTGRES_USER: ${STAFF_DB_USER}
