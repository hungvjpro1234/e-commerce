version: "3.9"

x-app-base: &app-base
  env_file:
    - .env
  environment:
    DJANGO_SETTINGS_MODULE: config.settings.local
    PYTHONUNBUFFERED: "1"
  restart: unless-stopped

services:
  web-service:
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
      PYTHONUNBUFFERED: "1"
    build:
      context: ./services/web-service
    container_name: web-service
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./services/web-service:/app
    ports:
      - "${WEB_SERVICE_PORT:-8000}:8000"
    depends_on:
      - staff-service
      - customer-service
      - gaming-service
    restart: unless-stopped

  staff-service:
    <<: *app-base
    build:
      context: ./services/staff-service
    container_name: staff-service
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./services/staff-service:/app
      - ./shared:/app/shared
    ports:
      - "${STAFF_SERVICE_PORT:-8001}:8000"
    depends_on:
      - staff-db

  customer-service:
    <<: *app-base
    build:
      context: ./services/customer-service
    container_name: customer-service
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./services/customer-service:/app
      - ./shared:/app/shared
    ports:
      - "${CUSTOMER_SERVICE_PORT:-8002}:8000"
    depends_on:
      - customer-db

  cloth-service:
    <<: *app-base
    build:
      context: ./services/cloth-service
    container_name: cloth-service
    command: python manage.py runserver 0.0.0.0:8000
