{% extends 'base.html' %}
{% block title %}Login | E-Commerce{% endblock %}
{% block content %}
<div class="form-card" style="max-width:480px;margin:auto;">
  <h2>Customer Login</h2>
  <form method="post" action="/login">
    {% csrf_token %}
    <div class="form-group"><label>Email</label><input type="email" name="email" required></div>
    <div class="form-group"><label>Password</label><input type="password" name="password" required></div>
    <button class="button" type="submit" style="width:100%;margin-top:10px">Login</button>
  </form>
  <p class="muted" style="margin-top:14px">New here? <a href="/register">Create account</a></p>
</div>
{% endblock %}
