{% extends 'base.html' %}
{% block title %}Register | E-Commerce{% endblock %}
{% block content %}
<div class="form-card" style="max-width:480px;margin:auto;">
  <h2>Create Account</h2>
  <form method="post" action="/register">
    {% csrf_token %}
    <div class="form-group"><label>Full Name</label><input name="full_name" required></div>
    <div class="form-group"><label>Email</label><input type="email" name="email" required></div>
    <div class="form-group"><label>Password</label><input type="password" name="password" required minlength="8"></div>
    <button class="button" type="submit" style="width:100%;margin-top:10px">Register</button>
  </form>
  <p class="muted" style="margin-top:14px">Already have an account? <a href="/login">Log in</a></p>
</div>
{% endblock %}
