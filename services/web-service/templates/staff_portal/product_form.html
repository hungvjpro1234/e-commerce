{% extends 'base.html' %}
{% load dict_filters %}
{% block title %}{{ action }} Product | Staff{% endblock %}
{% block content %}
<div class="section-title-row">
  <h2>{{ action }} {{ domain_label }} Product</h2>
  <a href="/staff/products/{{ domain }}">← Back to list</a>
</div>
<div class="panel">
  <form method="post">
    {% csrf_token %}
    <div class="form-grid">
      <div class="form-group full">
        <label>Name *</label>
        <input name="name" value="{{ product.name|default:'' }}" required>
      </div>
      <div class="form-group full">
        <label>Description</label>
        <textarea name="description">{{ product.description|default:'' }}</textarea>
      </div>
      <div class="form-group">
        <label>Price *</label>
        <input name="price" type="number" step="0.01" value="{{ product.price|default:'' }}" required>
      </div>
      <div class="form-group">
        <label>Stock *</label>
        <input name="stock" type="number" value="{{ product.stock|default:0 }}" required>
      </div>
      <div class="form-group full">
        <label>Image URL</label>
        <input name="image_url" type="url" value="{{ product.image_url|default:'' }}">
      </div>
      {% for field in extra_fields %}
        <div class="form-group">
          <label>{{ field.label }}</label>
          <input name="{{ field.name }}" type="{{ field.type }}" value="{% if product %}{{ product|dict_value:field.name }}{% endif %}">
        </div>
      {% endfor %}
      <div class="form-group" style="flex-direction:row;align-items:center;gap:8px;">
        <input type="checkbox" name="is_active" id="is_active" {% if product.is_active|default:True %}checked{% endif %} style="width:auto;">
        <label for="is_active">Active (visible to customers)</label>
      </div>
    </div>
    <div class="inline-actions" style="margin-top:20px;">
      <button class="button" type="submit">{{ action }} Product</button>
      <a href="/staff/products/{{ domain }}" style="padding:12px 18px;">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
