{% extends 'base.html' %}
{% block title %}Staff Login | E-Commerce{% endblock %}
{% block content %}
<div class="form-card" style="max-width:480px;margin:auto;">
  <h2>Staff Login</h2>
  <form method="post" action="/staff/login">
    {% csrf_token %}
    <div class="form-group"><label>Email</label><input type="email" name="email" required></div>
    <div class="form-group"><label>Password</label><input type="password" name="password" required></div>
    <button class="button" type="submit" style="width:100%;margin-top:10px">Login as Staff</button>
  </form>
  <p class="muted" style="margin-top:16px;font-size:0.9rem;">
    Demo credentials: <code>admin@example.com</code> / <code>strongpass123</code>
  </p>
</div>
{% endblock %}
